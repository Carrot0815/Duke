<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BabylonJS Viewer</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #74ebd5, #ACB6E5);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
        width: 90%;
        max-width: 500px;
    }

    h1 {
        margin-bottom: 20px;
        color: #333;
    }

    select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 20px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    select:hover {
        border-color: #74ebd5;
    }

    .viewerContainer {
        width: 100%;
        height: 400px;
        border-radius: 12px;
        overflow: hidden;
        background: #f5f5f5;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
    }

    babylon {
        width: 100%;
        height: 100%;
        display: block;
    }
</style>

<script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

<script>
function loadit(modelUrl) {
    if(modelUrl) {
        let viewer = BabylonViewer.viewerManager.getViewerById('viewerID');
        viewer.loadModel(modelUrl)
    }
}
</script>
</head>

<body>

<div class="container">

    <h1>3D Model Viewer</h1>

    <select onchange="loadit(this.value)">
        <option value="">select model</option>
        <option value="./models/bear.glb">Bear</option>
        <option value="./models/hunter.glb">Hunter</option>
        <option value="./models/grandma.glb">Grandma</option>
    </select>

    <div class='viewerContainer'>
        <babylon id="viewerID"></babylon>
    </div>

</div>

</body>
</html>
